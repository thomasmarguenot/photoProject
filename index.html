<!doctype html>
<html lang="fr">
  <head>
  <link rel="stylesheet" href="/src/fonts/local-fonts.css" />
  <!-- Quicksand Font (Fontshare) -->
  <link href="https://api.fontshare.com/v2/css?f[]=quicksand@400,500,600,700,800&display=swap" rel="stylesheet" />
    <!-- Inter Tight Thin Italic Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@1,100&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@1,100&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    
    <!-- Inter Tight Variable Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400..900&display=swap"
        rel="stylesheet"
      />
    </noscript>
    
    <!-- Per-route <title>, description and canonical are rendered by React 19
         (see src/components/common/Seo). A static <title> is intentionally
         omitted: a duplicate would win over React's (browsers use the first).
         Kept here: social/OG defaults, which JS-less scrapers (LinkedIn,
         Facebook) read straight from the static HTML. -->
    <meta name="theme-color" content="#111111" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Thomas Marguenot" />
    <meta property="og:locale" content="fr_FR" />
    <meta
      property="og:title"
      content="Thomas Marguenot — Développeur React & React Native, Paris"
    />
    <meta
      property="og:description"
      content="Développeur JS Full-Stack freelance à Paris, spécialisé React et React Native. 15 ans d'expérience. Disponible pour vos projets web et mobiles."
    />
    <meta property="og:url" content="https://thomasmarguenot.fr/" />
    <meta property="og:image" content="https://thomasmarguenot.fr/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Portrait de Thomas Marguenot" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Thomas Marguenot — Développeur React & React Native, Paris"
    />
    <meta
      name="twitter:description"
      content="Développeur JS Full-Stack freelance à Paris, spécialisé React et React Native. Disponible pour vos projets web et mobiles."
    />
    <meta name="twitter:image" content="https://thomasmarguenot.fr/og-image.jpg" />

    <link rel="preload" as="image" href="/src/assets/home/pp.webp" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
